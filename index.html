<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Overdrive</title>
  </head>
    <body>
        <header>
        
            <div class="container-principal">
                <h1 class="title-tablero"> 
                    <div class="icono-rayo"> 
                        <svg xmlns="http://www.w3.org/2000/svg"   class="lucide lucide-zap-icon lucide-zap"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
                    </div>
                    Overdrive
                </h1>
                <div class="controles-proyecto">
                    <!-- Selector de Proyecto -->
                    <select id="selectProyecto" class="select-proyecto" onchange="cambiarProyecto(this.value)"></select>
                    
                    <!-- Botón del modal de nuevo Tarea -->
                    <button class="btn-primario" onclick="abrirModalTarea()" title="Añadir Tarea">
                        + Tarea
                    </button>
                        
                    <!-- Botón del modal de nuevo Proyecto -->
                    <button  class="btn-secundario" onclick="abrirModalCarpeta()" title="Crear Nueva Carpeta">
                        <h1 class="title-button-tablero">
                            <div>
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-folder-plus-icon lucide-folder-plus"><path d="M12 10v6"/><path d="M9 13h6"/><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
                            </div>
                            Tablero
                        </h1>
                    </button>
                </div>

                <div class="controles-derecha">
                    <button class="btn-peligro" onclick="resetearTodo()">
                        🗑 Resetear
                    </button>
                </div>
            </div>
        </header>

        <div class="contenedor-tablero">
            <div class="columna-tablero" id="tablero">
                <div class="cabecera-columna">
                    <span class="titulo-columna">
                        <span class="punto-estado estado-por-hacer"></span>
                        Por Hacer
                    </span>
                    <span class="contador-tareas">1</span>
                </div> 
                <div class="lista-tareas">
                    <!-- Tarjeta de ejemplo -->
                    <div class="tarjeta">
                        <div class="cabecera-tarjeta">
                            <span class="etiqueta-prioridad p-alta">ALTA</span>
                        </div>
                        <div class="contenido-tarjeta">Diseñar la UI</div>
                        <div class="meta-tarjeta">
                            <span class="etiqueta-responsable">👤 Yo</span>
                        </div>
                    </div>
                </div>       
            </div>

            <div class="columna-tablero" id="tablero">
                <div class="cabecera-columna">
                    <span class="titulo-columna">
                        <span class="punto-estado estado-en-progreso"></span>
                        En Progreso
                    </span>
                    <span class="contador-tareas">0</span>
                </div>
            </div>

            <div class="columna-tablero" id="tablero">
                <div class="cabecera-columna">
                    <span class="titulo-columna">
                        <span class="punto-estado estado-completado"></span>
                        Completado
                    </span>
                    <span class="contador-tareas">0</span>
                </div>
            </div>
        </div>
    </body>
    <script src="script.js"></script>
</html>
