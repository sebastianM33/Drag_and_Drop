<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Overdrive</title>
  </head>
  <body>
    <header>
      <div class="container-principal">
        <!-- Botón Menú (Hambrurguesa) - Solo visible en móvil -->
        <button id="menuToggle" class="btn-menu" aria-label="Abrir menú">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-menu"
          >
            <line x1="4" x2="20" y1="12" y2="12" />
            <line x1="4" x2="20" y1="6" y2="6" />
            <line x1="4" x2="20" y1="18" y2="18" />
          </svg>
        </button>

        <h1 class="title-tablero">
          <span class="icono-rayo">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="lucide lucide-zap-icon lucide-zap"
            >
              <path
                d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"
              />
            </svg>
          </span>
          Overdrive
        </h1>

        <!-- Contenedor desplegable para controles -->
        <div class="controles-globales" id="controlesGlobales">
          <div class="controles-proyecto">
            <!-- Selector de Proyecto -->
            <select
              id="selectProyecto"
              class="select-proyecto"
              onchange="cambiarProyecto(this.value)"
            ></select>

            <!-- Botón del modal de nuevo Tarea -->
            <button
              class="btn-primario"
              onclick="abrirModalTarea()"
              title="Añadir Tarea"
            >
              + Tarea
            </button>

            <!-- Botón del modal de nuevo Proyecto -->
            <button
              class="btn-secundario"
              onclick="abrirModalProyecto()"
              title="Crear Nueva Carpeta"
            >
              <span class="title-button-tablero">
                <span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-folder-plus-icon lucide-folder-plus"
                  >
                    <path d="M12 10v6" />
                    <path d="M9 13h6" />
                    <path
                      d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"
                    />
                  </svg>
                </span>
                Tablero
              </span>
            </button>
          </div>

          <div class="controles-derecha">
            <button class="btn-peligro" onclick="resetearTodo()">
              🗑 Resetear
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="contenedor-tablero" id="tablero"></div>
    <!-- MODAL PROYECTO -->
    <div class="capa-modal" id="modalProyecto">
      <div class="modal">
        <h2>📂 Nuevo Proyecto</h2>
        <div class="grupo-formulario">
          <label>NOMBRE DEL PROYECTO</label>
          <input
            type="text"
            id="nombreNuevoProyecto"
            class="input-formulario"
            placeholder="Ej: Rediseño Web..."
          />
        </div>
        <div class="acciones-modal">
          <button
            onclick="cerrarModal('modalProyecto')"
            style="
              background: transparent;
              color: var(--texto-secundario);
              border: none;
              cursor: pointer;
              font-weight: 600;
            "
          >
            Cancelar
          </button>
          <button class="btn-primario" onclick="crearProyecto()">
            Crear Proyecto
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL TAREA -->
    <div class="capa-modal" id="modalTarea">
      <div class="modal">
        <h2>📝 Nueva Tarea</h2>
        <div class="grupo-formulario">
          <label>DESCRIPCIÓN</label>
          <input
            type="text"
            id="contenidoNuevaTarea"
            class="input-formulario"
            placeholder="Ej: Arreglar login..."
          />
        </div>

        <div class="fila-formulario">
          <div class="grupo-formulario">
            <label>RESPONSABLE</label>
            <input
              type="text"
              id="responsableNuevaTarea"
              class="input-formulario"
              placeholder="Ej: Yo..."
            />
          </div>
          <div class="grupo-formulario">
            <label>PRIORIDAD</label>
            <select id="prioridadNuevaTarea" class="input-formulario">
              <option value="baja">Baja</option>
              <option value="media">Media</option>
              <option value="alta">Alta</option>
            </select>
          </div>
        </div>

        <div class="fila-formulario">
          <div class="grupo-formulario">
            <label>VENCE EL</label>
            <input type="date" id="fechaNuevaTarea" class="input-formulario" />
          </div>
          <div class="grupo-formulario">
            <label>ESTADO INICIAL</label>
            <select id="estadoNuevaTarea" class="input-formulario">
              <option value="por-hacer">Por Hacer</option>
              <option value="en-proceso">En Progreso</option>
              <option value="terminado">Terminado</option>
            </select>
          </div>
        </div>

        <div class="acciones-modal">
          <button
            onclick="cerrarModal('modalTarea')"
            style="
              background: transparent;
              color: var(--texto-secundario);
              border: none;
              cursor: pointer;
              font-weight: 600;
            "
          >
            Cancelar
          </button>
          <button class="btn-primario" onclick="guardarNuevaTarea()">
            Guardar Tarea
          </button>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
